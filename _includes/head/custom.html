  <style>
    /* 每条记录的容器 */
    .item {
      display: flex;
      align-items: center;    /* ← 垂直居中 */
      margin-bottom: 0.6em;
    }
    /* logo 大小统一 */
    img.logo {
      width: 2.5em;
      height: 2.5em;
      object-fit: contain;
      vertical-align: middle;
      margin-right: 0.5em;
    }
    .item .text {
      line-height: 1.5;
    }

    .industry-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 16px;
      margin-top: 12px;
    }

    .industry-card {
      background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
      border: 1px solid #dbe7f3;
      border-radius: 14px;
      padding: 16px 18px;
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.06);
    }

    .industry-kicker {
      display: inline-block;
      font-size: 0.72em;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #1d4ed8;
      background: #e0edff;
      border-radius: 999px;
      padding: 4px 10px;
      margin-bottom: 10px;
    }

    .industry-card h3 {
      margin: 0 0 8px 0;
      font-size: 1.05em;
      line-height: 1.35;
    }

    .industry-card p {
      margin: 0;
      color: #374151;
      line-height: 1.6;
      font-size: 0.95em;
    }

    .industry-links {
      margin-top: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .industry-links a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      font-size: 0.86em;
      font-weight: 600;
      color: #0f3d91;
      background: #ffffff;
      border: 1px solid #cbd5e1;
      border-radius: 999px;
      padding: 6px 11px;
      transition: all 0.18s ease;
    }

    .industry-links a:hover {
      background: #eff6ff;
      border-color: #93c5fd;
      color: #1d4ed8;
    }

    .writing-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
      margin-top: 12px;
    }

    .writing-card {
      background: linear-gradient(180deg, #ffffff 0%, #fcfcff 100%);
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 18px 20px;
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.05);
    }

    .writing-card-featured {
      border-color: #d8dffe;
      background: linear-gradient(180deg, #ffffff 0%, #f7f9ff 100%);
    }

    .writing-kicker {
      display: inline-block;
      font-size: 0.72em;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #4338ca;
      background: #eef2ff;
      border-radius: 999px;
      padding: 4px 10px;
      margin-bottom: 10px;
    }

    .writing-card h3 {
      margin: 0 0 8px 0;
      font-size: 1.08em;
      line-height: 1.4;
    }

    .writing-card p {
      margin: 0;
      color: #374151;
      line-height: 1.65;
      font-size: 0.95em;
    }

    .writing-meta {
      margin-top: 12px;
      font-size: 0.84em;
      color: #6b7280;
    }

    .writing-links {
      margin-top: 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .writing-links a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      font-size: 0.86em;
      font-weight: 600;
      color: #312e81;
      background: #ffffff;
      border: 1px solid #c7d2fe;
      border-radius: 999px;
      padding: 6px 11px;
      transition: all 0.18s ease;
    }

    .writing-links a:hover {
      background: #eef2ff;
      border-color: #a5b4fc;
      color: #4338ca;
    }

    /* Keep the visitor-map fallback inline so stale cached CSS still renders it. */
    .visitor-map-wrap {
      margin-top: 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      overflow: hidden;
    }

    .visitor-map-widgets {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 22px;
      width: 100%;
    }

    .visitor-map-widgets > div {
      width: min(100%, 420px);
      display: flex;
      justify-content: center;
    }

    /* The MapMyVisitors flat map renders an <a><img>; keep it responsive
       within its container without forcing dimensions. */
    .visitor-map-widgets > div img {
      max-width: 100%;
      height: auto;
    }

    .visitor-map-fallback {
      width: min(100%, 420px);
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      background: #ffffff;
      border: 1px solid #d8dee8;
      border-radius: 8px;
      box-shadow: 0 4px 14px rgba(15, 23, 42, .08);
      color: #2f3a4a;
    }

    .visitor-map-fallback[hidden] {
      display: none;
    }

    .visitor-map-fallback__map {
      flex: 0 0 116px;
      width: 116px;
      max-width: 34%;
      height: auto;
      fill: #dbeafe;
      stroke: #3b82f6;
      stroke-width: 3;
    }

    .visitor-map-fallback__map circle {
      fill: #ef4444;
      stroke: #ffffff;
      stroke-width: 2;
    }

    .visitor-map-fallback strong {
      display: block;
      color: #1f2937;
      font-size: .92rem;
      line-height: 1.25;
    }

    .visitor-map-fallback span {
      display: block;
      margin-top: 4px;
      color: #52525b;
      font-size: .82rem;
      line-height: 1.35;
    }

    @media (max-width: 520px) {
      .visitor-map-fallback {
        align-items: flex-start;
      }

      .visitor-map-fallback__map {
        flex-basis: 96px;
      }
    }
  </style>
<style>
#videos {
  margin-top: 40px;
}

#videos h2 {
  font-size: 1.5em;
  margin-bottom: 20px;
  color: #222;
}

.video-list {
  list-style: none;
  padding: 0;
}

.video-list li {
  margin-bottom: 40px;
}

.video-list p {
  margin-left: 1em;
  color: #444;
  font-size: 0.95em;
}

/* 缩小视频比例，使页面更协调 */
.video-wrapper {
  position: relative;
  padding-bottom: 52%; /* 控制视频高宽比例 */
  height: 0;
  overflow: hidden;
  max-width: 680px; /* 视频整体宽度限制 */
  margin: 0 auto;
  border-radius: 10px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.15);
}

.video-wrapper iframe {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  border: 0;
  border-radius: 10px;
}

.video-cover {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  padding: 0;
  border: 0;
  cursor: pointer;
  overflow: hidden;
  background: #000;
  border-radius: 10px;
}

.video-cover img {
  width: 100%;
  height: 100%;
  display: block;
  object-fit: cover;
}

.video-cover-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0, 0, 0, 0.18);
  transition: background 160ms ease;
}

.video-cover:hover .video-cover-overlay,
.video-cover:focus-visible .video-cover-overlay {
  background: rgba(0, 0, 0, 0.28);
}

.video-play-icon {
  width: 68px;
  height: 68px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.92);
  box-shadow: 0 4px 16px rgba(0, 0, 0, 0.25);
  position: relative;
}

.video-play-icon::after {
  content: "";
  position: absolute;
  top: 50%;
  left: 52%;
  transform: translate(-42%, -50%);
  border-top: 16px solid transparent;
  border-bottom: 16px solid transparent;
  border-left: 24px solid #111;
}
</style>
