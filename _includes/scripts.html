<!-- Dark mode: apply theme before paint to avoid flash -->
<script>
(function () {
  var saved = localStorage.getItem('color-scheme');
  if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }
})();
</script>

<!-- Dark mode: floating toggle button + circle-reveal transition -->
<button id="dark-mode-toggle" class="dark-mode-fab" aria-label="Toggle dark mode" title="Toggle dark/light mode">
  <span class="fab-icon fab-sun">☀️</span>
  <span class="fab-icon fab-moon">🌙</span>
  <span class="fab-ripple"></span>
</button>

<style>
/* ── Floating Action Button ── */
.dark-mode-fab {
  position: fixed;
  bottom: 2rem;
  right: 2rem;
  z-index: 9999;
  width: 52px;
  height: 52px;
  border-radius: 50%;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.35rem;
  background: #ffffff;
  box-shadow: 0 4px 20px rgba(0,0,0,0.18), 0 1px 4px rgba(0,0,0,0.10);
  transition: transform 0.2s cubic-bezier(.34,1.56,.64,1),
              box-shadow 0.2s ease,
              background 0.3s ease;
  overflow: hidden;
  outline: none;
}
.dark-mode-fab:hover {
  transform: scale(1.12);
  box-shadow: 0 8px 28px rgba(0,0,0,0.22);
}
.dark-mode-fab:active { transform: scale(0.96); }

.fab-icon { line-height: 1; transition: opacity 0.2s, transform 0.3s; }
.fab-sun  { display: inline; }
.fab-moon { display: none; }

/* Spin-swap animation on click */
.dark-mode-fab.switching .fab-sun,
.dark-mode-fab.switching .fab-moon {
  animation: icon-spin 0.35s ease forwards;
}
@keyframes icon-spin {
  0%   { transform: rotate(0deg) scale(1); opacity: 1; }
  50%  { transform: rotate(180deg) scale(0); opacity: 0; }
  100% { transform: rotate(360deg) scale(1); opacity: 1; }
}

[data-theme="dark"] .dark-mode-fab {
  background: #1e2130;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.07);
}
[data-theme="dark"] .fab-sun  { display: none; }
[data-theme="dark"] .fab-moon { display: inline; }

/* ── View Transition: circle-reveal from click point ── */
@keyframes vt-reveal {
  from { clip-path: circle(0% at var(--vt-x, 50%) var(--vt-y, 50%)); }
  to   { clip-path: circle(150% at var(--vt-x, 50%) var(--vt-y, 50%)); }
}
@keyframes vt-fadeout {
  to { opacity: 0; }
}
::view-transition-new(root) {
  animation: vt-reveal 0.55s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  z-index: 1;
}
::view-transition-old(root) {
  animation: vt-fadeout 0.55s ease forwards;
  z-index: 0;
}

/* Smooth CSS transition fallback (non-Chrome) */
html {
  transition: background-color 0.35s ease, color 0.35s ease;
}
</style>

<script>
(function () {
  var STORAGE_KEY = 'color-scheme';
  var html = document.documentElement;

  window.addEventListener('DOMContentLoaded', function () {
    var btn = document.getElementById('dark-mode-toggle');
    if (!btn) return;

    btn.addEventListener('click', function (e) {
      var isDark = html.getAttribute('data-theme') === 'dark';

      // Store click coordinates for the circle-reveal origin
      var rect = btn.getBoundingClientRect();
      var cx = Math.round(rect.left + rect.width / 2);
      var cy = Math.round(rect.top + rect.height / 2);
      html.style.setProperty('--vt-x', cx + 'px');
      html.style.setProperty('--vt-y', cy + 'px');

      // Spin animation on button icon
      btn.classList.add('switching');
      setTimeout(function () { btn.classList.remove('switching'); }, 400);

      function doToggle() {
        if (isDark) {
          html.removeAttribute('data-theme');
          localStorage.setItem(STORAGE_KEY, 'light');
        } else {
          html.setAttribute('data-theme', 'dark');
          localStorage.setItem(STORAGE_KEY, 'dark');
        }
      }

      // Use View Transitions API if available, else plain toggle
      if (document.startViewTransition) {
        document.startViewTransition(doToggle);
      } else {
        doToggle();
      }
    });
  });
})();
</script>

<!-- ═══════════════════════════════════════════════
     THE UPSIDE DOWN — Stranger Things Easter Egg
     Button: bottom-left 🔦
     ═══════════════════════════════════════════════ -->
<button id="upside-down-btn" aria-label="Enter the Upside Down" title="Enter the Upside Down...">🔦</button>
<canvas id="spore-canvas"></canvas>

<style>
/* ── Flashlight FAB ── */
#upside-down-btn {
  position: fixed;
  bottom: 2rem;
  left: 2rem;
  z-index: 9999;
  width: 52px;
  height: 52px;
  border-radius: 50%;
  border: none;
  cursor: pointer;
  font-size: 1.4rem;
  background: #ffffff;
  box-shadow: 0 4px 20px rgba(0,0,0,0.18);
  transition: transform 0.2s cubic-bezier(.34,1.56,.64,1), box-shadow 0.2s;
  outline: none;
  display: flex;
  align-items: center;
  justify-content: center;
}
#upside-down-btn:hover {
  transform: scale(1.12);
  box-shadow: 0 8px 28px rgba(180,0,0,0.35);
}
[data-upside-down] #upside-down-btn {
  background: #1a0005;
  box-shadow: 0 0 18px rgba(255,40,40,0.6);
  animation: flicker-btn 3s infinite;
}
@keyframes flicker-btn {
  0%,100% { box-shadow: 0 0 18px rgba(255,40,40,0.6); }
  50%      { box-shadow: 0 0 30px rgba(255,40,40,0.9); }
  75%      { box-shadow: 0 0 10px rgba(255,40,40,0.3); }
}

/* ── Spore canvas ── */
#spore-canvas {
  position: fixed;
  inset: 0;
  z-index: 9998;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.8s ease;
}
[data-upside-down] #spore-canvas { opacity: 1; }

/* ── Upside Down color takeover ── */
[data-upside-down] {
  /* Invert all colors then shift hue to give the red/blue Upside Down palette */
  filter: invert(1) hue-rotate(145deg) saturate(1.4) brightness(0.85);
}
/* But keep the spore canvas and button un-inverted via double-invert */
[data-upside-down] #spore-canvas,
[data-upside-down] #upside-down-btn {
  filter: invert(1) hue-rotate(-145deg) saturate(0.72) brightness(1.15);
}

/* ── Continuous Y-axis spin while in Upside Down ── */
@keyframes ud-spin {
  0%   { transform: perspective(1200px) rotateY(0deg); }
  100% { transform: perspective(1200px) rotateY(360deg); }
}

/* Entry: ramp up from 0 to full speed */
@keyframes ud-enter {
  0%   { transform: perspective(1200px) rotateY(0deg); filter: brightness(1); }
  25%  { filter: brightness(0.1); }
  50%  { filter: brightness(0.6); }
  100% { transform: perspective(1200px) rotateY(360deg); filter: brightness(1); }
}

/* Exit: slow down and snap back */
@keyframes ud-exit {
  0%   { transform: perspective(1200px) rotateY(0deg); }
  60%  { filter: brightness(0.15); transform: perspective(1200px) rotateY(-180deg); }
  100% { transform: perspective(1200px) rotateY(0deg); filter: brightness(1); }
}

.ud-flipping     { animation: ud-enter 1s ease-in forwards; }
.ud-flipping-out { animation: ud-exit  0.7s ease-out forwards; }
.ud-spinning     { animation: ud-spin 9s linear infinite; }

/* ── Vignette overlay for atmosphere ── */
[data-upside-down] body::after {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9997;
  background: radial-gradient(ellipse at center,
    transparent 55%,
    rgba(100,0,0,0.35) 100%);
  mix-blend-mode: multiply;
  animation: vignette-pulse 4s ease-in-out infinite;
}
@keyframes vignette-pulse {
  0%,100% { opacity: 0.7; }
  50%      { opacity: 1; }
}
</style>

<script>
(function () {
  var html  = document.documentElement;
  var btn   = null;
  var sporeCanvas = null;
  var sporeCtx    = null;
  var spores = [];
  var sporeRAF = null;
  var active = false;

  /* ── Spore particle system ── */
  function Spore() { this.reset(true); }
  Spore.prototype.reset = function (initial) {
    var W = window.innerWidth, H = window.innerHeight;
    this.x  = Math.random() * W;
    this.y  = initial ? Math.random() * H : H + 20;
    this.r  = 1.2 + Math.random() * 3.5;        // radius
    this.vx = (Math.random() - 0.5) * 0.4;
    this.vy = -(0.3 + Math.random() * 0.6);     // drift upward
    this.wobble = Math.random() * Math.PI * 2;
    this.wobbleSpeed = 0.008 + Math.random() * 0.012;
    this.alpha = 0.4 + Math.random() * 0.5;
    this.glow  = 4 + Math.random() * 8;
    /* some spores are elongated (stringy) */
    this.stringy = Math.random() < 0.35;
    this.len = this.stringy ? 8 + Math.random() * 18 : 0;
    this.rot = Math.random() * Math.PI * 2;
    this.vrot = (Math.random() - 0.5) * 0.015;
    /* faint tendrils */
    this.tendrils = Math.random() < 0.12 ? Math.floor(2 + Math.random() * 3) : 0;
  };
  Spore.prototype.step = function () {
    this.wobble += this.wobbleSpeed;
    this.x += this.vx + Math.sin(this.wobble) * 0.25;
    this.y += this.vy;
    this.rot += this.vrot;
    if (this.y < -40) this.reset(false);
    if (this.x < -40) this.x = window.innerWidth + 40;
    if (this.x > window.innerWidth + 40) this.x = -40;
  };
  Spore.prototype.draw = function (ctx) {
    ctx.save();
    ctx.globalAlpha = this.alpha;
    ctx.shadowColor = 'rgba(220,210,255,0.9)';
    ctx.shadowBlur  = this.glow;
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rot);

    if (this.stringy) {
      /* elongated wisp */
      var grad = ctx.createLinearGradient(0, -this.len/2, 0, this.len/2);
      grad.addColorStop(0,   'rgba(240,235,255,0)');
      grad.addColorStop(0.5, 'rgba(240,235,255,0.9)');
      grad.addColorStop(1,   'rgba(240,235,255,0)');
      ctx.strokeStyle = grad;
      ctx.lineWidth   = this.r * 0.9;
      ctx.lineCap     = 'round';
      ctx.beginPath();
      ctx.moveTo(0, -this.len/2);
      ctx.bezierCurveTo(
        this.r * 1.5, -this.len * 0.2,
       -this.r * 1.5,  this.len * 0.2,
        0,             this.len/2
      );
      ctx.stroke();
    } else {
      /* fluffy round spore */
      var g = ctx.createRadialGradient(0, 0, 0, 0, 0, this.r * 1.6);
      g.addColorStop(0,   'rgba(255,252,255,0.95)');
      g.addColorStop(0.5, 'rgba(230,220,255,0.5)');
      g.addColorStop(1,   'rgba(200,190,255,0)');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(0, 0, this.r * 1.6, 0, Math.PI * 2);
      ctx.fill();
    }

    /* tiny tendril hairs */
    if (this.tendrils > 0) {
      ctx.strokeStyle = 'rgba(220,215,255,0.35)';
      ctx.lineWidth   = 0.5;
      for (var i = 0; i < this.tendrils; i++) {
        var ang = (i / this.tendrils) * Math.PI * 2;
        var tlen = this.r * (2.5 + Math.random());
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(Math.cos(ang) * tlen, Math.sin(ang) * tlen);
        ctx.stroke();
      }
    }

    ctx.restore();
  };

  function initSpores() {
    var W = sporeCanvas.width  = window.innerWidth;
    var H = sporeCanvas.height = window.innerHeight;
    spores = [];
    for (var i = 0; i < 90; i++) spores.push(new Spore());
  }

  function animateSpores() {
    sporeCtx.clearRect(0, 0, sporeCanvas.width, sporeCanvas.height);
    for (var i = 0; i < spores.length; i++) {
      spores[i].step();
      spores[i].draw(sporeCtx);
    }
    sporeRAF = requestAnimationFrame(animateSpores);
  }

  function stopSpores() {
    if (sporeRAF) { cancelAnimationFrame(sporeRAF); sporeRAF = null; }
  }

  /* ── Toggle ── */
  function enterUpsideDown() {
    active = true;
    document.body.classList.add('ud-flipping');
    setTimeout(function () {
      document.body.classList.remove('ud-flipping');
      document.body.classList.add('ud-spinning');
      html.setAttribute('data-upside-down', '');
      initSpores();
      animateSpores();
    }, 1000);
  }

  function exitUpsideDown() {
    active = false;
    document.body.classList.remove('ud-spinning');
    document.body.classList.add('ud-flipping-out');
    stopSpores();
    html.removeAttribute('data-upside-down');
    setTimeout(function () {
      document.body.classList.remove('ud-flipping-out');
    }, 700);
  }

  window.addEventListener('DOMContentLoaded', function () {
    btn = document.getElementById('upside-down-btn');
    sporeCanvas = document.getElementById('spore-canvas');
    sporeCtx    = sporeCanvas.getContext('2d');

    window.addEventListener('resize', function () {
      if (active) initSpores();
    });

    btn.addEventListener('click', function () {
      if (active) { exitUpsideDown(); }
      else        { enterUpsideDown(); }
    });
  });
})();
</script>

<!-- Origami / paper-plane particles background -->
<canvas id="origami-bg"></canvas>
<script>
(() => {
  const canvas = document.getElementById("origami-bg");
  const ctx = canvas.getContext("2d");

  // ---------- CONFIG (tweak here) ----------
  const cfg = {
    count: 12,                 // 数量（建议 10-18，更少更高级）
    minSize: 14,               // 最小尺寸（px）
    maxSize: 38,               // 最大尺寸（px）
    fallSpeed: 0.18,           // 下落/漂浮速度（越小越克制）
    drift: 0.28,               // 横向漂移强度（越小越稳）
    rotateSpeed: 0.0018,       // 旋转速度
    alpha: 0.22,               // 透明度（建议 0.18~0.30）
    blur: 0,                   // 可选：轻微虚化(0/0.5/1)
    palette: [
      ["#A855F7", "#3B82F6"],  // 紫 -> 蓝
      ["#7C3AED", "#06B6D4"],  // 紫 -> 青
      ["#C084FC", "#60A5FA"]   // 淡紫 -> 淡蓝
    ],
    // 降帧节能：true 会把渲染控制在 ~30fps（更安静）
    lowPower: true
  };

  // Ensure canvas is a fixed background layer and never blocks clicks
  Object.assign(canvas.style, {
    position: "fixed",
    inset: "0",
    zIndex: "-1",
    pointerEvents: "none"
  });
  document.body.style.position = "relative";

  const rand = (a, b) => a + Math.random() * (b - a);
  const pick = (arr) => arr[(Math.random() * arr.length) | 0];

  function resize() {
    const dpr = Math.max(1, window.devicePixelRatio || 1);
    canvas.width = Math.floor(window.innerWidth * dpr);
    canvas.height = Math.floor(window.innerHeight * dpr);
    canvas.style.width = window.innerWidth + "px";
    canvas.style.height = window.innerHeight + "px";

    // Safari-stable transform
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.scale(dpr, dpr);

    ctx.imageSmoothingEnabled = true;
  }

  function makeGradient(size, c1, c2) {
    const g = ctx.createLinearGradient(-size, -size, size, size);
    g.addColorStop(0, c1);
    g.addColorStop(1, c2);
    return g;
  }

  class Shard {
    constructor(initial = true) {
      this.reset(initial);
    }

    reset(initial) {
      this.size = rand(cfg.minSize, cfg.maxSize);

      // Spawn across the screen; initial spawns anywhere, later spawns above the top
      this.x = rand(0, window.innerWidth);
      this.y = initial ? rand(0, window.innerHeight) : -rand(60, 220);

      this.vx = rand(-0.12, 0.12) * cfg.drift;
      this.vy = rand(cfg.fallSpeed * 0.7, cfg.fallSpeed * 1.6);

      this.rot = rand(0, Math.PI * 2);
      this.vr = rand(-1, 1) * cfg.rotateSpeed;

      const [c1, c2] = pick(cfg.palette);
      this.c1 = c1;
      this.c2 = c2;

      // 0 = triangle shard, 1 = kite shard (origami-ish)
      this.type = Math.random() < 0.7 ? 0 : 1;

      // fold highlight position
      this.fold = rand(0.25, 0.8);
    }

    step(dt) {
      // Subtle drift using sin to feel floaty instead of linear
      this.rot += this.vr * (dt * 60);
      this.x += (this.vx * (dt * 60)) + Math.sin(this.rot * 0.8) * 0.05;
      this.y += this.vy * (dt * 60);

      // wrap / respawn
      if (this.y - this.size > window.innerHeight + 50) this.reset(false);
      if (this.x < -80) this.x = window.innerWidth + 80;
      if (this.x > window.innerWidth + 80) this.x = -80;
    }

    draw() {
      const s = this.size;

      ctx.save();
      ctx.translate(this.x, this.y);
      ctx.rotate(this.rot);

      if (cfg.blur > 0) ctx.filter = `blur(${cfg.blur}px)`;
      ctx.globalAlpha = cfg.alpha;

      // Fill
      ctx.fillStyle = makeGradient(s, this.c1, this.c2);

      // A very subtle outline for "paper edge"
      ctx.strokeStyle = "rgba(0,0,0,0.05)";
      ctx.lineWidth = 1;

      ctx.beginPath();
      if (this.type === 0) {
        // Triangle shard (paper-plane vibe)
        ctx.moveTo(-s * 0.95, -s * 0.15);
        ctx.lineTo(s * 0.95, 0);
        ctx.lineTo(-s * 0.25, s * 0.85);
      } else {
        // Kite (origami)
        ctx.moveTo(0, -s);
        ctx.lineTo(s * 0.9, 0);
        ctx.lineTo(0, s);
        ctx.lineTo(-s * 0.6, 0);
      }
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      // Fold highlight (small translucent triangle)
      ctx.globalAlpha = cfg.alpha * 0.55;
      ctx.fillStyle = "rgba(255,255,255,0.35)";
      ctx.beginPath();
      ctx.moveTo(-s * 0.12, -s * 0.12);
      ctx.lineTo(s * this.fold, 0);
      ctx.lineTo(-s * 0.06, s * 0.35);
      ctx.closePath();
      ctx.fill();

      ctx.restore();
    }
  }

  let shards = [];
  function init() {
    shards = [];
    for (let i = 0; i < cfg.count; i++) shards.push(new Shard(true));
  }

  // ---------- animation loop ----------
  let last = performance.now();
  let acc = 0;

  function loop(now) {
    const rawDt = Math.min(0.05, (now - last) / 1000);
    last = now;

    // Optional low-power mode: effectively ~30fps
    if (cfg.lowPower) {
      acc += rawDt;
      if (acc < (1 / 30)) {
        requestAnimationFrame(loop);
        return;
      }
    }
    const dt = cfg.lowPower ? acc : rawDt;
    acc = 0;

    ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);

    for (const p of shards) {
      p.step(dt);
      p.draw();
    }

    requestAnimationFrame(loop);
  }

  window.addEventListener("resize", () => {
    resize();
    init();
  });

  resize();
  init();
  requestAnimationFrame(loop);
})();
</script>
