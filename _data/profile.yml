short_bio: >-
  <p>
    I am <strong>Yifan Yang</strong>, a Ph.D. student in the Department of Geography at
    <a href="https://www.tamu.edu" target="_blank" rel="noopener">Texas&nbsp;A&amp;M University</a>,
    advised by <a href="https://www.geoearlab.com/people" target="_blank" rel="noopener">Dr. Lei Zou</a>
    in the <a href="https://www.geoearlab.com" target="_blank" rel="noopener">Geospatial Exploration and Resolution (GEAR) Lab</a>.
    My research centers on <strong>Responsible and Autonomous GeoAI</strong>, with a focus on explainable,
    trustworthy systems for spatial decision-making and disaster resilience.
    I founded <a href="https://autogeoai4sci.github.io/" target="_blank" rel="noopener"><strong>AutonomousGeoAI4Science</strong></a>,
    an open community hub for papers, tools, benchmarks, and collaboration.
  </p>
  <p style="font-style: italic; color: #4b5563; border-left: 4px solid #93c5fd; padding-left: 12px;">
    🔭 Vision: To transcend the boundaries of screens and make the real world our playground of intelligence —
    where AI, space, and humanity coexist and co-create.
  </p>
  <p>
    Before my Ph.D., I earned an M.S. in Spatial Data Science from the
    <a href="https://www.usc.edu" target="_blank" rel="noopener">University of Southern California</a>,
    where I worked with Dr. John P. Wilson on the Urban Trees Initiative, and completed a research internship at the
    <a href="https://sdl.gis.harvard.edu/" target="_blank" rel="noopener">Spatial Data Lab, Harvard University</a>
    under Dr. Siqin Wang. I received my B.S. in Software Engineering from
    <a href="https://www.hainanu.edu.cn/" target="_blank" rel="noopener">Hainan University</a>, China.
  </p>
  <p>
    <strong>Research interests:</strong> AI4Science · Data Science · GeoAI · Disaster Resilience · Multimodal AI.
    My doctoral committee members are Dr. Heng Cai, Dr. Andrew Klein, and Dr. Zhengzhong Tu.
    Beyond research, I enjoy basketball 🏀, football ⚽, golf 🏌️, poker 🎴, and talk shows 🎆.
  </p>

